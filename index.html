<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apotek Sehat Mandiri - Rizky Tanjung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container nav-wrapper">
            <h1 class="brand">Apotek<span>Sehat</span></h1>
            <nav class="navbar">
                <ul>
                    <li><a href="#home">Beranda</a></li>
                    <li><a href="#produk">Produk</a></li>
                    <li><a href="#pemesanan">Pesan Obat</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <h2>Layanan Kesehatan Terpercaya</h2>
                <p>Menyediakan obat-obatan berkualitas dengan pelayanan cepat langsung ke rumah Anda.</p>
            </div>
        </section>

        <section id="produk" class="container">
            <h2 class="section-title">Produk & Layanan Kami</h2>
            
            <div class="admin-panel">
                <input type="text" id="itemName" placeholder="Nama Obat Baru">
                <input type="number" id="itemPrice" placeholder="Harga (Rp)">
                <button id="addBtn">Tambah Produk</button>
            </div>

            <div id="productGrid" class="product-layout">
                </div>
        </section>

        <section id="pemesanan" class="container">
            <div class="form-wrapper">
                <h2 class="section-title">Formulir Pemesanan</h2>
                <form id="orderForm">
                    <div class="input-group">
                        <label>Nama Pasien</label>
                        <input type="text" id="custName" placeholder="Nama Lengkap">
                        <span class="error" id="err-custName"></span>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="custEmail" placeholder="nama@email.com">
                        <span class="error" id="err-custEmail"></span>
                    </div>
                    <div class="input-group">
                        <label>Jumlah Pesanan</label>
                        <input type="number" id="custQty" placeholder="0">
                        <span class="error" id="err-custQty"></span>
                    </div>
                    <div class="input-group">
                        <label>Jenis Layanan</label>
                        <select id="serviceType">
                            <option value="reguler">Pengiriman Reguler</option>
                            <option value="express">Express (1 Jam)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Pembayaran</label>
                        <div class="radio-wrap">
                            <input type="radio" name="pay" checked> Transfer 
                            <input type="radio" name="pay"> COD
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Kirim Pesanan</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p><strong>Rizky Tanjung</strong> | UTS Praktikum Pemrograman Web Dasar 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
