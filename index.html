<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apotek Modern - Rizky Tanjung</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blob"></div>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">Apotek<span>Pro</span></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#produk">Produk</a></li>
                    <li><a href="#pemesanan">Pemesanan</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <section id="home" class="hero">
            <h1>Layanan Kesehatan <br><span>Masa Depan</span></h1>
            <p>Sistem manajemen obat pintar untuk kesehatan Anda yang lebih baik.</p>
        </section>

        <section id="produk" class="glass-section">
            <h2 class="title">Katalog Obat</h2>
            
            <div class="admin-panel">
                <input type="text" id="itemName" placeholder="Nama Produk">
                <input type="number" id="itemPrice" placeholder="Harga (Rp)">
                <button id="addBtn">Tambah</button>
            </div>

            <div id="productGrid" class="grid-container">
                </div>
        </section>

        <section id="pemesanan" class="form-section">
            <div class="glass-card">
                <h2 class="title">Form Pemesanan</h2>
                <form id="orderForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Nama Pasien</label>
                            <input type="text" id="custName" placeholder="Tulis nama anda">
                            <span class="error" id="err-custName"></span>
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="custEmail" placeholder="email@gmail.com">
                            <span class="error" id="err-custEmail"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Nomor Telepon</label>
                        <input type="number" id="custPhone" placeholder="08...">
                        <span class="error" id="err-custPhone"></span>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Jenis Obat</label>
                            <select id="cat">
                                <option value="Bebas">Obat Bebas</option>
                                <option value="Resep">Obat Resep</option>
                            </select>
                        </div>
                        <div class="input-group radio-check">
                            <label>Metode</label>
                            <div class="radio-group">
                                <label><input type="radio" name="pay" checked> Transfer</label>
                                <label><input type="radio" name="pay"> COD</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-glow">Konfirmasi Pesanan</button>
                </form>
            </div>
        </section>

    </main>

    <footer>
        <p>Created by <strong>Rizky Tanjung</strong> &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
